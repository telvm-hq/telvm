name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: MCP package (Node)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: MCP — test and build
        working-directory: mcp
        run: |
          npm ci
          npm test
          npm run build

      - name: dirteel (Zig 0.13 unit tests)
        run: |
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ
          ZIG_ROOT="${{ github.workspace }}/zig-linux-x86_64-0.13.0"
          echo "$ZIG_ROOT" >> "$GITHUB_PATH"
          export PATH="$ZIG_ROOT:$PATH"
          cd agents/dirteel && zig build test

      - name: Run ExUnit via Docker Compose
        run: docker compose --profile test run --rm companion_test

  speedeel:
    name: speedeel (preflight)
    runs-on: ubuntu-latest
    container:
      image: hexpm/elixir:1.17.3-erlang-27.3.2-debian-bookworm-20250317-slim
    steps:
      - uses: actions/checkout@v6

      - name: OS packages (node, build tools)
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential git curl ca-certificates nodejs npm \
          && rm -rf /var/lib/apt/lists/*

      - name: mix deps.get + speedeel.preflight
        working-directory: speedeel
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix speedeel.preflight
