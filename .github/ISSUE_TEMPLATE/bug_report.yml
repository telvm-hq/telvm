name: Bug report
description: Something is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Steps, commands, OS, Docker / Elixir versions if relevant.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or links (optional).
