# Primary local entrypoint: Phoenix "companion" + Postgres.
# Mounts the host repo into the container so Mix/Phoenix run inside Linux (recommended on Windows/macOS).
name: telvm

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: companion_dev
    volumes:
      - telvm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Stand-in "companion VM" (BYOI preview): arbitrary Node container with telvm labels for Engine API discovery.
  vm_node:
    image: node:22-alpine
    command:
      - node
      - -e
      - "require('http').createServer((q,r)=>r.end('ok')).listen(3333,'0.0.0.0')"
    labels:
      telvm.sandbox: "true"
      telvm.runtime: "node"

  # OpenAI-compatible inference for Agent setup (/agent). CPU-first: no GPU devices; optional envs reduce parallel load.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      CUDA_VISIBLE_DEVICES: "-1"
      OLLAMA_NUM_PARALLEL: "1"

  # Goose CLI: long-lived container for `docker compose exec -it goose goose session` (TTY); config in goose_config volume.
  goose:
    build:
      context: ./images/goose
      dockerfile: Dockerfile
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - goose_config:/root/.config/goose
    labels:
      telvm.goose: "true"
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]

  # One-shot: wait for ollama API, then pull two small models (disk only; inference loads one at a time as needed).
  ollama_pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL_A: qwen2.5:0.5b
      MODEL_B: tinyllama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "ollama_pull: waiting for ollama at $$OLLAMA_HOST..."
        i=0
        while [ $$i -lt 120 ]; do
          if ollama list >/dev/null 2>&1; then
            echo "ollama_pull: server ready"
            break
          fi
          i=$$((i + 1))
          sleep 1
        done
        if [ $$i -eq 120 ]; then
          echo "ollama_pull: timeout waiting for server" >&2
          exit 1
        fi
        echo "ollama_pull: pulling $$MODEL_A ..."
        ollama pull "$$MODEL_A"
        echo "ollama_pull: pulling $$MODEL_B ..."
        ollama pull "$$MODEL_B"
        echo "ollama_pull: done"
    restart: "no"

  companion:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./companion:/app
      - companion_deps:/app/deps
      - companion_build:/app/_build
      - companion_assets_node:/app/assets/node_modules
      # Host Docker API (or Docker Desktop proxy) for future Engine HTTP adapter.
      - /var/run/docker.sock:/var/run/docker.sock
      # Lab image Dockerfiles for in-container `docker build`.
      - ./images:/images:ro
      # LAN connectivity + inventory scripts (see inventories/lan-host/README.md).
      - ./scripts:/telvm-scripts:ro
      # Zig agent source for in-container `docker build` (retardeel verifier).
      - ./agents:/agents:ro
      # Morayeel Playwright run artifacts (headless browser lab).
      - morayeel_runs:/morayeel-runs
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:4000/telvm/api/fyi >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 180s
    environment:
      # Closed-agent discovery on Machines filters by com.docker.compose.project (default project name from compose file).
      TELVM_COMPOSE_PROJECT: ${TELVM_COMPOSE_PROJECT:-telvm}
      DATABASE_URL: postgres://postgres:postgres@db:5432/companion_dev
      PHX_HTTP_IP: 0.0.0.0
      PHX_SERVER: "true"
      PORT: "4000"
      TELVM_INFERENCE_BASE_URL: http://ollama:11434/v1
      # Ephemeral VM manager pre-flight lab container: same Compose network + fixed DNS alias for probes.
      TELVM_LAB_DOCKER_NETWORK: telvm_default
      TELVM_LAB_DNS_ALIAS: telvm-lab-workload
      # Network agent: PowerShell ICS service on the Windows gateway (see agents/telvm-network-agent/README.md).
      # Discovers LAN hosts via ARP and probes each for a Zig node agent on :9100.
      TELVM_NETWORK_AGENT_URL: http://host.docker.internal:9225
      # Per-workload egress proxy: closed-agent services use HTTP_PROXY=http://companion:4001|4002 (no .env required).
      # allow_hosts: vendor HTTPS + Debian mirrors for apt through CONNECT. If Basic soak fails with denies in
      # companion logs (egress_proxy) or Pre-flight "recent denies", add the missing hostname here and recreate companion.
      # telvm_closed_* depends_on companion healthy so listeners start before those containers run.
      TELVM_EGRESS_ENABLED: "1"
      # morayeel workload :4003 — Playwright uses HTTP_PROXY to companion; allow in-cluster lab host.
      TELVM_EGRESS_WORKLOADS: '[{"id":"closed_claude","port":4001,"allow_hosts":["api.anthropic.com",".anthropic.com","deb.debian.org","security.debian.org",".debian.org"]},{"id":"closed_codex","port":4002,"allow_hosts":["api.openai.com",".openai.com","deb.debian.org","security.debian.org",".debian.org"]},{"id":"morayeel","port":4003,"allow_hosts":["morayeel_lab"]}]'
    depends_on:
      db:
        condition: service_healthy
      vm_node:
        condition: service_started
      ollama:
        condition: service_started
      morayeel_lab:
        condition: service_started

  # Minimal HTTP lab for Morayeel (synthetic session cookie; no real auth).
  morayeel_lab:
    build:
      context: ./agents/morayeel/lab
      dockerfile: Dockerfile
    labels:
      telvm.lab: "morayeel"

  # Standalone Phoenix LiveView guides (Markdown under TELVM_GUIDES_ROOT). Not embedded in Companion.
  speedeel:
    build:
      context: .
      dockerfile: speedeel/Dockerfile
    volumes:
      - ./speedeel:/app
      - speedeel_deps:/app/deps
      - speedeel_build:/app/_build
      - speedeel_assets_node:/app/assets/node_modules
      - ./docs:/telvm-docs:ro
    ports:
      - "4010:4010"
    environment:
      MIX_ENV: dev
      PHX_SERVER: "true"
      PHX_HOST: "0.0.0.0"
      PORT: "4010"
      # Dev watchers + code_reloader break many Docker Desktop bind-mount setups; see speedeel/config/dev.exs
      SPEEDEEL_DOCKER: "1"
      TELVM_GUIDES_ROOT: /telvm-docs/events/diy-pawnshop-electric-cars

  # One-shot test runner (canonical local/CI-style run inside Linux). Does not start phx.server.
  # Usage: docker compose --profile test run --rm companion_test
  companion_test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./companion:/app
      - companion_deps:/app/deps
      - companion_build:/app/_build
      - companion_assets_node:/app/assets/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - ./images:/images:ro
      - ./agents:/telvm-agents:ro
    environment:
      MIX_ENV: test
      TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/companion_test
      TELVM_DIRTEEL_PROFILES: /telvm-agents/dirteel/profiles/closed_images.json
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mix deps.get && mix test"]

  # Closed-agent CLIs (lab_relaxed). HTTP(S)_PROXY targets companion egress listeners (see TELVM_EGRESS_WORKLOADS above).
  # Strict in-container iptables (upstream init-firewall) is a separate step — see docs/closed-agent-integration-test-matrix.md (C5/C6).
  telvm_closed_claude:
    build:
      context: .
      dockerfile: images/telvm-closed-claude/Dockerfile
    labels:
      telvm.agent: "closed"
      telvm.agent.vendor: "anthropic"
      telvm.agent.product: "claude-code"
      telvm.agent.egress: "lab_relaxed"
    environment:
      HTTP_PROXY: http://companion:4001
      HTTPS_PROXY: http://companion:4001
      NO_PROXY: companion,db,ollama,localhost,127.0.0.1,host.docker.internal
    depends_on:
      companion:
        condition: service_healthy

  telvm_closed_codex:
    build:
      context: .
      dockerfile: images/telvm-closed-codex/Dockerfile
    labels:
      telvm.agent: "closed"
      telvm.agent.vendor: "openai"
      telvm.agent.product: "codex"
      telvm.agent.egress: "lab_relaxed"
    environment:
      HTTP_PROXY: http://companion:4002
      HTTPS_PROXY: http://companion:4002
      NO_PROXY: companion,db,ollama,localhost,127.0.0.1,host.docker.internal
    depends_on:
      companion:
        condition: service_healthy

volumes:
  telvm_pgdata:
  companion_deps:
  companion_build:
  companion_assets_node:
  speedeel_deps:
  speedeel_build:
  speedeel_assets_node:
  ollama_data:
  goose_config:
  morayeel_runs:
