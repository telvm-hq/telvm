# Run guides app from this directory: `docker compose up` (build context is repo root).
name: telvm-speedeel

services:
  speedeel:
    build:
      context: ..
      dockerfile: speedeel/Dockerfile
    volumes:
      - .:/app
      - speedeel_deps:/app/deps
      - speedeel_build:/app/_build
      - speedeel_assets_node:/app/assets/node_modules
      - ../docs:/telvm-docs:ro
    ports:
      - "4010:4010"
    environment:
      MIX_ENV: dev
      PHX_SERVER: "true"
      PHX_HOST: "0.0.0.0"
      PORT: "4010"
      SPEEDEEL_DOCKER: "1"
      TELVM_GUIDES_ROOT: /telvm-docs/events/diy-pawnshop-electric-cars

volumes:
  speedeel_deps:
  speedeel_build:
  speedeel_assets_node:
